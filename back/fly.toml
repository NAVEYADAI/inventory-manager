# fly.toml app configuration file for inventory-manager-back

app = "inventory-manager-back"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"  # או Dockerfile.dev אם אתה רוצה את גרסת הפיתוח

[http_service]
  internal_port = 3000       # הפורט שבו ה-back מאזין
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
