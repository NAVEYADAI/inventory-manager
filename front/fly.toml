# fly.toml app configuration file for inventory-manager-frontend

app = "inventory-manager-frontend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000     # הפורט שבו הפרונט שלך מאזין בפועל
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
